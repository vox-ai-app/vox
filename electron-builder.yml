appId: com.vox-ai-app.vox
productName: Vox
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
asarUnpack:
  - resources/**
  - out/main/*.worker.js
  - out/main/chunks/**
  - node_modules/adm-zip/**
  - node_modules/better-sqlite3/**
  - node_modules/bindings/**
  - node_modules/file-uri-to-path/**
  - node_modules/@huggingface/transformers/**
  - node_modules/sharp/**
  - node_modules/@img/**
  - node_modules/detect-libc/**
  - node_modules/semver/**
  - node_modules/@picovoice/pvrecorder-node/**
  - node_modules/onnxruntime-node/**
  - node_modules/onnxruntime-common/**
win:
  executableName: Vox
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    NSScreenCaptureUsageDescription: Application requests access to record the screen.
    NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
    NSContactsUsageDescription: Application requests access to your contacts to help address emails and messages.
    NSAppleEventsUsageDescription: Application requests permission to automate Mail and Messages on your behalf.
  notarize: true
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: vox-ai-app
  repo: vox
  releaseType: release
